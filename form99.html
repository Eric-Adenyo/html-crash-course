
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale=1.0">
    <title>Document</title>
    <style>
       .container{
        padding:15px;
        border:1px solid green;
        max-width:600px;
        width:100%;
        border-radius:5px;
       }
       form{
        display:flex;
        flex-wrap:wrap;
       }
       .lb{
        margin-bottom:5px;
        min-width:48%;
       }
       input[type=text],input[type=email],textarea{
        min-width:45%;
        margin-bottom:5px;
        padding:10px;
       }
       select{
        margin-right:5px;
        min-width:16%;
        padding:5px;
        margin-bottom:5px;
       }
       textarea{
        height:150px;
        resize:none;
       }
    </style>
</head>
<body>
    <div class="container">
        <form>
            <label class="lb">First Name:</label>
            <input type="text" name="fname" placeholder="your first name"/>
            <label class="lb">last Name:</label>
            <input type="text" name="lname" placeholder="your last name"/>
            <label class="lb">Email:</label>
            <input type="email" name="email" placeholder="your email"/>
            <label class="lb">Phone Number:</label>
            <input type="text" name="contact" placeholder="your phone number"/>
            <label class="lb">Gender:</label>
            <input type="radio" name="gender"/>
            <label style="margin:5px;">Male</label>
            <input type="radio" name="gender"/>
            <label style="margin:5px;">Female</label>
            <label class="lb">Date of birth</label>
            <select>
                <option>Day</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
            </select>
            <select>
                <option>month</option>
                <option>Jan</option>
                <option>Feb</option>
                <option>Mar</option>
                <option>Apr</option>
                <option>May</option>
            </select>
            <select>
                <option>year</option>
                <option>1991</option>
                <option>2001</option>
                <option>2004</option>
                <option>2010</option>
                <option>2025</option>
            </select>
            <label class="lb">Message:</label>
            <textarea>

            </textarea>
        </form>
    </div>
</body>
</html>
