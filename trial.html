<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       .dropdown{
        position:relative;
       }
       .drop1{
        padding:15px;
        background-color:green;
        color:white;
        text-align:center;
        border:none;
       }
       .dropdown-content{
        display:none;
        position:absolute;
    
        min-width:150px;
        background-color:#f9f9f9;
       }
       .dropdown-content a{
        padding:5px;
        display:block;
        text-decoration:none;
        color:blue;
       }
       .dropdown:hover .dropdown-content{
            display:block;
       }
       .dropdown:hover .drop1{
            background-color:red;
       }
        a:hover{
            background-color:yellow;
       }
    </style>
</head>
<body>
   <div class="dropdown">
    <button class="drop1">Dropdown menu</button>
    <div class="dropdown-content">
        <a href="#">Link 1</a>
        <a href="#">Link 2</a>
        <a href="#">Link 3</a>
    </div>
   </div>
</body>
</html>
